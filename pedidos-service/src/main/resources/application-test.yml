spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/smartlogix_pedidos
    username: user_logix
    password: password123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Mantenemos las configuraciones de Feign e Inventario por si el contexto de Spring las requiere
inventario:
  service:
    url: http://localhost:8081 # Cambiado a localhost para tests

feign:
  circuitbreaker:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000