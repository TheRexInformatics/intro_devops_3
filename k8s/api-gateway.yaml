apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: smartlogix
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: 908560159565.dkr.ecr.us-east-1.amazonaws.com/api-gateway:latest
        ports:
        - containerPort: 8080
        env:
        - name: INVENTARIO_SERVICE_URL
          value: "http://inventario-service:8081"
        - name: PEDIDOS_SERVICE_URL
          value: "http://pedidos-service:8082"
        - name: ENVIOS_SERVICE_URL
          value: "http://envios-service:8083"
        - name: BFF_SERVICE_URL
          value: "http://bff-service:8084"
        - name: AUTH_SERVICE_URL
          value: "http://auth-service:8085"
        envFrom:
        - configMapRef:
            name: smartlogix-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: smartlogix
spec:
  type: LoadBalancer 
  ports:
  - port: 8080       
    targetPort: 8080 
  selector:
    app: api-gateway